<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrewPOS - Coffee Shop POS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #4c1d0f 0%, #7c2d12 50%, #b45309 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            color: #fff;
        }
        .login-card {
            background: #fff; color: #1c1917; border-radius: 20px; padding: 48px 40px;
            width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
        }
        .logo {
            width: 80px; height: 80px; background: linear-gradient(135deg, #92400e, #b45309);
            border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center;
            justify-content: center; font-size: 40px;
        }
        .brand { font-size: 32px; font-weight: 900; letter-spacing: -1px; color: #7c2d12; }
        .brand span { color: #b45309; }
        .subtitle { color: #78716c; margin: 6px 0 28px; font-size: 14px; }
        .google-btn {
            width: 100%; padding: 14px; border: 1px solid #d6d3d1; border-radius: 10px;
            background: #fff; display: flex; align-items: center; justify-content: center;
            gap: 12px; cursor: pointer; font-size: 15px; font-weight: 600; color: #1c1917;
            transition: all 0.15s;
        }
        .google-btn:hover { background: #fafaf9; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .google-btn img { width: 20px; height: 20px; }
        .google-btn:disabled { opacity: 0.6; cursor: default; }
        .note { font-size: 12px; color: #a8a29e; margin-top: 22px; line-height: 1.5; }
        #error { color: #dc2626; font-size: 13px; margin-top: 14px; min-height: 18px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">☕</div>
        <div class="brand">BREW<span>POS</span></div>
        <div class="subtitle">Coffee Shop POS &amp; Inventory System</div>

        <button class="google-btn" id="googleSignInBtn" onclick="signInWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A12 12 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12 12 0 0 1-4.129 5.77l6.19 5.238C39.99 35.79 44 30.135 44 24c0-1.341-.138-2.65-.389-3.917z"/>
            </svg>
            Sign in with Google
        </button>
        <div id="error"></div>
        <div class="note">
            Sign in with your Google account to access BrewPOS.<br>
            The first account becomes the store administrator.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, getIdToken } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {{ firebase_web_config | tojson }};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.signInWithGoogle = async function () {
            const btn = document.getElementById('googleSignInBtn');
            const err = document.getElementById('error');
            err.textContent = '';
            btn.disabled = true;
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                const idToken = await getIdToken(result.user);
                const resp = await fetch('/api/google_signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken })
                });
                const data = await resp.json();
                if (data.success) {
                    window.location.href = '/select_role';
                } else {
                    err.textContent = data.message || 'Sign-in failed.';
                    btn.disabled = false;
                }
            } catch (e) {
                err.textContent = e.message || 'Google sign-in failed.';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
